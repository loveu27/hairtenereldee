<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hairtdaa</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
background:#ffd6e7;
font-family:'Poppins',sans-serif;
text-align:center;
margin:0;
overflow-x:hidden;
}

/* titles */

h1{
font-family:'Pacifico',cursive;
color:#ff3e8a;
font-size:42px;
margin-top:40px;
}

h2{
font-family:'Pacifico',cursive;
color:#ff4fa0;
}

/* heart overlay container */

.heartContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;
z-index:0;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-40px;
animation:floatHeart linear infinite;
opacity:0.7;
}

@keyframes floatHeart{

0%{
transform:translateY(0) translateX(0) rotate(0deg);
opacity:0;
}

20%{
opacity:0.8;
}

50%{
transform:translateY(-40vh) translateX(40px);
}

100%{
transform:translateY(-120vh) translateX(-40px) rotate(360deg);
opacity:0;
}

}

/* pages */

.page{
display:none;
padding:30px;
}

.active{
display:block;
}

/* icon cards */

.menu{
display:flex;
justify-content:center;
gap:60px;
margin-top:80px;
flex-wrap:wrap;
position:relative;
z-index:1;
}

.iconCard{

background:white;
width:180px;
height:180px;

border-radius:30px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

box-shadow:0 10px 30px rgba(0,0,0,0.2);

cursor:pointer;

transition:0.3s;
}

.iconCard:hover{
transform:scale(1.1);
}

.icon{
font-size:80px;
color:#ff4fa0;
}

.label{
margin-top:10px;
font-weight:500;
color:#ff4fa0;
}

/* gallery */

.gallery{
position:relative;
z-index:1;
}

.gallery img{
width:260px;
margin:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* buttons */

button{
background:#ff5fa2;
border:none;
padding:12px 22px;
border-radius:15px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

/* phone lock */

.lock{
width:260px;
margin:auto;
margin-top:20px;
position:relative;
z-index:1;
}

.dots{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:20px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
border:2px solid #ff5fa2;
}

.filled{
background:#ff5fa2;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.key{
background:white;
border-radius:50%;
width:70px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.key:hover{
background:#ffe6f0;
}

video{
margin-top:20px;
border-radius:20px;
position:relative;
z-index:1;
}

</style>
</head>

<body>

<h1>Open one of these, bebe<3</h1>

<!-- heart overlay -->

<div class="heartContainer" id="heartContainer"></div>

<!-- HOME PAGE -->

<div id="home" class="page active">

<div class="menu">

<div class="iconCard" onclick="showPage('photos')">

<div class="icon">📷</div>
<div class="label">Photos</div>

</div>

<div class="iconCard" onclick="showPage('video')">

<div class="icon">🎥</div>
<div class="label">Secret Video</div>

</div>

</div>

</div>


<!-- PHOTOS -->

<div id="photos" class="page">

<h2>Our Photos 💗</h2>

<button onclick="showPage('home')">⬅ Back</button>

<div class="gallery">

<img src="1.jpeg">
<img src="2.jpeg">
<img src="3.jpeg">

</div>

</div>


<!-- VIDEO LOCK -->

<div id="video" class="page">

<h2>Secret Video 🎥</h2>

<p><b>Нууц кодоо оруулна уу</b></p>
<p>Hint: Хоёулангынх нь анх танилцсан өдөр</p>

<div class="lock">

<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">

<div class="key" onclick="press(1)">1</div>
<div class="key" onclick="press(2)">2</div>
<div class="key" onclick="press(3)">3</div>

<div class="key" onclick="press(4)">4</div>
<div class="key" onclick="press(5)">5</div>
<div class="key" onclick="press(6)">6</div>

<div class="key" onclick="press(7)">7</div>
<div class="key" onclick="press(8)">8</div>
<div class="key" onclick="press(9)">9</div>

<div></div>
<div class="key" onclick="press(0)">0</div>
<div class="key" onclick="clearPin()">⌫</div>

</div>

</div>

<div id="videoBox" style="display:none">

<video width="350" controls>
<source src="video.mp4" type="video/mp4">
</video>

</div>

<br>

<button onclick="showPage('home')">⬅ Back</button>

</div>



<script>

/* page switch */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}

/* phone pin */

let pin=""

function press(num){

if(pin.length<4){
pin+=num
updateDots()
}

if(pin.length==4){

if(pin==="1003"){
document.getElementById("videoBox").style.display="block"
}else{
alert("Wrong code 💔")
}

pin=""
updateDots()
}

}

function clearPin(){
pin=""
updateDots()
}

function updateDots(){

let dots=document.querySelectorAll(".dot")

dots.forEach((d,i)=>{
d.classList.remove("filled")
if(i<pin.length){
d.classList.add("filled")
}
})

}

/* heart overlay generator */

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

const hearts=["💗","💖","💕","💞","💓"]

heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)]

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=(15+Math.random()*30)+"px"

heart.style.animationDuration=(8+Math.random()*10)+"s"

document.getElementById("heartContainer").appendChild(heart)

setTimeout(()=>{
heart.remove()
},20000)

}

setInterval(createHeart,200)

</script>

</body>
</html>
